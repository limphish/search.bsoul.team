<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Inter,sans-serif;
    overflow:hidden;
}

canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

form{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:10px;
}

.logo img{

    width:72px;
    height:72px;
    border-radius:18px;

}

.logo h1{

    font-size:42px;
    font-weight:700;
    letter-spacing:-1px;

}

.logo span{

    display:block;
    color:#8f8f8f;
    font-size:17px;
    margin-top:5px;
}

.search-box{

    width:680px;
    max-width:90vw;

    transition:
        width .35s cubic-bezier(.22,1,.36,1),
        transform .3s;

}

textarea{

    width:100%;

    min-height:64px;
    max-height:220px;

    resize:none;
    overflow:hidden;

    border:none;
    outline:none;

    padding:18px 24px;

    border-radius:32px;

    font-size:18px;
    line-height:28px;

    text-align:center;

    color:white;

    background:rgba(255,255,255,.06);

    backdrop-filter:blur(28px);
    -webkit-backdrop-filter:blur(28px);

    border:1px solid rgba(255,255,255,.08);

    transition:.25s;

}

textarea:focus{

    background:rgba(255,255,255,.08);

    border-color:rgba(255,255,255,.15);

    box-shadow:

        0 0 0 1px rgba(255,255,255,.05),

        0 15px 60px rgba(255,255,255,.05);

}

input{
    width:100%;
    text-align:center;
    font-size:18px;
}

input:focus{
    border-color:rgba(255,255,255,.2);
    background:rgba(255,255,255,.08);
}

button{
    background:white;
    color:black;
    border:none;
    border-radius:999px;
    padding:14px 38px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<form id="searchForm">

<div class="logo">

    <img src="logo.png" alt="Logo">

    <div>

        <h1>BlackSoul Search</h1>

        <span>Поиск без лишнего</span>

    </div>

</div>

<div class="search-box" id="box">
    <textarea
        id="search"
        rows="1"
        placeholder="Введите запрос..."
    ></textarea>
</div>

<button>Поиск</button>

</form>

</div>

<script>
// ===== GOOGLE SEARCH =====
const textarea = document.getElementById("search");
const box = document.getElementById("box");

textarea.addEventListener("input", ()=>{

    textarea.style.height="auto";
    textarea.style.height=textarea.scrollHeight+"px";

    let w=680+textarea.value.length*4;

    if(w>1150)
        w=1150;

    box.style.width=w+"px";

});

document.getElementById("searchForm").onsubmit=e=>{

e.preventDefault();

const q=input.value.trim();

if(!q)return;

window.location.href=
"https://www.google.com/search?q="+encodeURIComponent(q);

};

// ===== STARS =====

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

let stars=[];

function resize(){

canvas.width=innerWidth;
canvas.height=innerHeight;

}

resize();

window.onresize=resize;

for(let i=0;i<120;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+0.4,
speed:Math.random()*0.7+0.25

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(const s of stars){

s.y+=s.speed;

if(s.y>canvas.height){

s.y=-5;
s.x=Math.random()*canvas.width;

}

ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

}

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
